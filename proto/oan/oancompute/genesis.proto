syntax = "proto3";
package oan.oancompute;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oancompute/params.proto";

option go_package = "oan/x/oancompute/types";

// GenesisState defines the oancompute module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
