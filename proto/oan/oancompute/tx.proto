syntax = "proto3";

package oan.oancompute;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "oan/oancompute/params.proto";

option go_package = "oan/x/oancompute/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  
  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams         (MsgUpdateParams        ) returns (MsgUpdateParamsResponse        );
  rpc SubmitInferenceJob   (MsgSubmitInferenceJob  ) returns (MsgSubmitInferenceJobResponse  );
  rpc CompleteInferenceJob (MsgCompleteInferenceJob) returns (MsgCompleteInferenceJobResponse);
  rpc SlashBadInference    (MsgSlashBadInference   ) returns (MsgSlashBadInferenceResponse   );
  rpc StakeCompute         (MsgStakeCompute        ) returns (MsgStakeComputeResponse        );
  rpc RegisterModel        (MsgRegisterModel       ) returns (MsgRegisterModelResponse       );
  rpc VerifyInferenceProof (MsgVerifyInferenceProof) returns (MsgVerifyInferenceProofResponse);
}
// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) =                        "authority";
  option           (amino.name) = "oan/x/oancompute/MsgUpdateParams";
  
  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

message MsgSubmitInferenceJob {
  option (cosmos.msg.v1.signer) = "creator";
  string creator   = 1;
  string modelId   = 2;
  string inputHash = 3;
  uint64 maxFee    = 4;
}

message MsgSubmitInferenceJobResponse {
  string jobId  = 1;
  string status = 2;
}

message MsgCompleteInferenceJob {
  option (cosmos.msg.v1.signer) = "creator";
  string creator    = 1;
  string jobId      = 2;
  string outputHash = 3;
  string proof      = 4;
}

message MsgCompleteInferenceJobResponse {
  bool   success = 1;
  uint64 reward  = 2;
}

message MsgSlashBadInference {
  option (cosmos.msg.v1.signer) = "creator";
  string creator       = 1;
  string jobId         = 2;
  string validatorAddr = 3;
  string evidence      = 4;
}

message MsgSlashBadInferenceResponse {
  bool   success = 1;
  uint64 slashed = 2;
}

message MsgStakeCompute {
  option (cosmos.msg.v1.signer) = "creator";
  string creator     = 1;
  string gpuType     = 2;
  uint64 capacity    = 3;
  uint64 pricePerJob = 4;
}

message MsgStakeComputeResponse {
  string stakeId  = 1;
  uint64 capacity = 2;
}

message MsgRegisterModel {
  option (cosmos.msg.v1.signer) = "creator";
  string creator    = 1;
  string modelId    = 2;
  string modelHash  = 3;
  string modelType  = 4;
  uint64 parameters = 5;
}

message MsgRegisterModelResponse {
  string modelId    = 1;
  bool   registered = 2;
}

message MsgVerifyInferenceProof {
  option (cosmos.msg.v1.signer) = "creator";
  string creator   = 1;
  string jobId     = 2;
  string proofHash = 3;
  string proofType = 4;
}

message MsgVerifyInferenceProofResponse {
  bool   valid = 1;
  string jobId = 2;
}

