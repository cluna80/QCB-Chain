syntax = "proto3";
package oan.oanbridge;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oanbridge/params.proto";

option go_package = "oan/x/oanbridge/types";

// GenesisState defines the oanbridge module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
