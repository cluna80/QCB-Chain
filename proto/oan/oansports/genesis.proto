syntax = "proto3";
package oan.oansports;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oansports/params.proto";

option go_package = "oan/x/oansports/types";

// GenesisState defines the oansports module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
