syntax = "proto3";
package oan.oanwalletproto;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oanwalletproto/params.proto";

option go_package = "oan/x/oanwalletproto/types";

// GenesisState defines the oanwalletproto module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
