syntax = "proto3";
package oan.oanmarket;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oanmarket/params.proto";

option go_package = "oan/x/oanmarket/types";

// GenesisState defines the oanmarket module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
