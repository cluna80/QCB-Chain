syntax = "proto3";
package oan.oanqsec;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oanqsec/params.proto";

option go_package = "oan/x/oanqsec/types";

// GenesisState defines the oanqsec module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
