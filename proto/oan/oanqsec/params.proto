syntax = "proto3";
package oan.oanqsec;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "oan/x/oanqsec/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "oan/x/oanqsec/Params";
  option (gogoproto.equal) = true;

  
  uint64 threatLevel = 1 [(gogoproto.moretags) = "yaml:\"threat_level\""];
  bool hybridRequired = 2 [(gogoproto.moretags) = "yaml:\"hybrid_required\""];
  uint64 rotationPeriod = 3 [(gogoproto.moretags) = "yaml:\"rotation_period\""];
  string activeAlgorithm = 4 [(gogoproto.moretags) = "yaml:\"active_algorithm\""];
}