syntax = "proto3";
package oan.oanmedia;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "oan/x/oanmedia/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "oan/x/oanmedia/Params";
  option (gogoproto.equal) = true;

  
  uint64 royaltyRate = 1 [(gogoproto.moretags) = "yaml:\"royalty_rate\""];
  uint64 mintFee = 2 [(gogoproto.moretags) = "yaml:\"mint_fee\""];
  uint64 maxRoyaltyChain = 3 [(gogoproto.moretags) = "yaml:\"max_royalty_chain\""];
}