syntax = "proto3";
package oan.oanmedia;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oanmedia/params.proto";

option go_package = "oan/x/oanmedia/types";

// GenesisState defines the oanmedia module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
