syntax = "proto3";
package oan.oancomms;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "oan/x/oancomms/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "oan/x/oancomms/Params";
  option (gogoproto.equal) = true;

  
  uint64 maxMsgSize = 1 [(gogoproto.moretags) = "yaml:\"max_msg_size\""];
  uint64 msgTtlBlocks = 2 [(gogoproto.moretags) = "yaml:\"msg_ttl_blocks\""];
  bool encryptionRequired = 3 [(gogoproto.moretags) = "yaml:\"encryption_required\""];
}