syntax = "proto3";
package oan.oancomms;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oancomms/params.proto";

option go_package = "oan/x/oancomms/types";

// GenesisState defines the oancomms module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
