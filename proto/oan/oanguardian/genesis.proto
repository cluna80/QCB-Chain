syntax = "proto3";
package oan.oanguardian;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oanguardian/params.proto";

option go_package = "oan/x/oanguardian/types";

// GenesisState defines the oanguardian module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
