syntax = "proto3";

package oan.oanprotocol;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "oan/oanprotocol/params.proto";

option go_package = "oan/x/oanprotocol/types";

// Query defines the gRPC querier service.
service Query {
  
  // Parameters queries the parameters of the module.
  rpc Params (QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/oan/oanprotocol/params";
  
  }
  
  // Queries a list of AddressStatus items.
  rpc AddressStatus (QueryAddressStatusRequest) returns (QueryAddressStatusResponse) {
    option (google.api.http).get = "/oan/oanprotocol/address_status/{address}";
  
  }
  
  // Queries a list of ProtocolParams items.
  rpc ProtocolParams (QueryProtocolParamsRequest) returns (QueryProtocolParamsResponse) {
    option (google.api.http).get = "/oan/oanprotocol/protocol_params";
  
  }
}
// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  
  // params holds all the parameters of this module.
  Params params = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

message QueryAddressStatusRequest {
  string address = 1;
}

message QueryAddressStatusResponse {
  string tier          = 1;
  string dailyReceived = 2;
  string dailyLimit    = 3;
  string maxBalance    = 4;
}

message QueryProtocolParamsRequest {}

message QueryProtocolParamsResponse {
  string params = 1;
}

