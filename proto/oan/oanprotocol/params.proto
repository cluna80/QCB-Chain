syntax = "proto3";
package oan.oanprotocol;
import "amino/amino.proto";
import "gogoproto/gogo.proto";
option go_package = "oan/x/oanprotocol/types";

// Params defines the economic constitution of Arkadina
message Params {
  option (amino.name) = "oan/x/oanprotocol/Params";
  option (gogoproto.equal) = true;

  // Max OAN a DAO-approved wallet can hold (uoan) — 800,000 OAN = 2% of supply
  uint64 max_wallet_balance = 1;

  // Max OAN a DID-verified wallet can hold (uoan) — 400,000 OAN = 1% of supply
  uint64 verified_max_balance = 2;

  // Max OAN an unverified wallet can hold (uoan) — 4,000 OAN = 0.01% of supply
  uint64 unverified_max_balance = 3;

  // Max OAN any address can receive per day (uoan) — 2,000 OAN
  uint64 max_daily_receive = 4;

  // Max OAN an unverified address can receive per day (uoan) — 40 OAN
  uint64 unverified_daily_receive = 5;

  // Epoch length in blocks — 14400 = 1 day at 6s block time
  uint64 epoch_length = 6;

  // Absolute hard cap — max OAN ever (uoan) — 50,000,000 OAN
  uint64 hard_cap = 7;

  // Current launch phase — genesis/validator/ubi/ecosystem/dex/open
  string launch_phase = 8;

  // Inflation in basis points — 100 = 1% per year
  uint64 inflation_bps = 9;

  // Whether economic protections are active
  bool protections_enabled = 10;
}
