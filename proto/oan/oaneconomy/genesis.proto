syntax = "proto3";

package oan.oaneconomy;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oaneconomy/params.proto";
import "oan/oaneconomy/task.proto";

option go_package = "oan/x/oaneconomy/types";

// GenesisState defines the oaneconomy module's genesis state.
message GenesisState {
  
  // params defines all the parameters of the module.
           Params params   = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  repeated Task   taskList = 2 [(gogoproto.nullable) = false] ;
}

