syntax = "proto3";
package oan.oanagent;

option go_package = "oan/x/oanagent/types";

message Agent {
  string index = 1; 
  string nodeId = 2; 
  string name = 3; 
  string agentType = 4; 
  string owner = 5; 
  string dnaHash = 6; 
  uint64 strength = 7; 
  uint64 agility = 8; 
  uint64 stamina = 9; 
  uint64 skill = 10; 
  uint64 generation = 11; 
  int32 totalTrades = 12; 
  int32 wins = 13; 
  int32 winRateBps = 14; 
  int32 experience = 15; 
  bool active = 16; 
  int32 genesisBlock = 17; 
  string parentA = 18; 
  string parentB = 19; 
  
}

