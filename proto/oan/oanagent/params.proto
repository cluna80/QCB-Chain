syntax = "proto3";
package oan.oanagent;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "oan/x/oanagent/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "oan/x/oanagent/Params";
  option (gogoproto.equal) = true;

  
  uint64 maxAgents = 1 [(gogoproto.moretags) = "yaml:\"max_agents\""];
  uint64 circuitBreakerMaxTx = 2 [(gogoproto.moretags) = "yaml:\"circuit_breaker_max_tx\""];
  uint64 circuitBreakerWindow = 3 [(gogoproto.moretags) = "yaml:\"circuit_breaker_window\""];
}