syntax = "proto3";
package oan.oanidentity;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "oan/x/oanidentity/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "oan/x/oanidentity/Params";
  option (gogoproto.equal) = true;

  
  uint64 maxIdentities = 1 [(gogoproto.moretags) = "yaml:\"max_identities\""];
  uint64 registrationFee = 2 [(gogoproto.moretags) = "yaml:\"registration_fee\""];
}