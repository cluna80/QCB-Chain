syntax = "proto3";

package oan.oanidentity;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "oan/oanidentity/params.proto";
import "oan/oanidentity/identity.proto";

option go_package = "oan/x/oanidentity/types";

// GenesisState defines the oanidentity module's genesis state.
message GenesisState {
  
  // params defines all the parameters of the module.
           Params   params       = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  repeated Identity identityList = 2 [(gogoproto.nullable) = false] ;
}

