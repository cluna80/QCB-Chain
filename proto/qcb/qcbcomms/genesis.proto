syntax = "proto3";
package qcb.qcbcomms;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "qcb/qcbcomms/params.proto";

option go_package = "qcb/x/qcbcomms/types";

// GenesisState defines the qcbcomms module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
