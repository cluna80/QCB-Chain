syntax = "proto3";
package qcb.qcbidentity;

option go_package = "qcb/x/qcbidentity/types";

message Identity {
  string index = 1; 
  string did = 2; 
  string owner = 3; 
  string displayName = 4; 
  string identityType = 5; 
  uint64 reputationScore = 6; 
  bool verified = 7; 
  int32 createdAt = 8; 
  int32 lastActive = 9; 
  
}

