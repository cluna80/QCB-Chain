syntax = "proto3";
package qcb.qcbidentity;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "qcb/x/qcbidentity/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "qcb/x/qcbidentity/Params";
  option (gogoproto.equal) = true;

  
  uint64 maxIdentities = 1 [(gogoproto.moretags) = "yaml:\"max_identities\""];
  uint64 registrationFee = 2 [(gogoproto.moretags) = "yaml:\"registration_fee\""];
}