syntax = "proto3";

package qcb.qcbidentity;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "qcb/qcbidentity/params.proto";

option go_package = "qcb/x/qcbidentity/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  
  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams     (MsgUpdateParams    ) returns (MsgUpdateParamsResponse    );
  rpc RegisterIdentity (MsgRegisterIdentity) returns (MsgRegisterIdentityResponse);
  rpc VerifyIdentity   (MsgVerifyIdentity  ) returns (MsgVerifyIdentityResponse  );
  rpc UpdateReputation (MsgUpdateReputation) returns (MsgUpdateReputationResponse);
  rpc LinkWallet       (MsgLinkWallet      ) returns (MsgLinkWalletResponse      );
}
// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) =                         "authority";
  option           (amino.name) = "qcb/x/qcbidentity/MsgUpdateParams";
  
  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

message MsgRegisterIdentity {
  option (cosmos.msg.v1.signer) = "creator";
  string creator      = 1;
  string did          = 2;
  string displayName  = 3;
  string identityType = 4;
}

message MsgRegisterIdentityResponse {
  string did      = 1;
  bool   verified = 2;
}

message MsgVerifyIdentity {
  option (cosmos.msg.v1.signer) = "creator";
  string creator   = 1;
  string did       = 2;
  string proofType = 3;
  string proofData = 4;
}

message MsgVerifyIdentityResponse {
  string did      = 1;
  bool   verified = 2;
}

message MsgUpdateReputation {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string did     = 2;
  int32  delta   = 3;
  string reason  = 4;
}

message MsgUpdateReputationResponse {
  string did      = 1;
  int32  newScore = 2;
}

message MsgLinkWallet {
  option (cosmos.msg.v1.signer) = "creator";
  string creator       = 1;
  string did           = 2;
  string walletAddress = 3;
}

message MsgLinkWalletResponse {
  string did           = 1;
  string walletAddress = 2;
}

