syntax = "proto3";
package qcb.antirug;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "qcb/antirug/params.proto";

option go_package = "qcb/x/antirug/types";

// GenesisState defines the antirug module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
