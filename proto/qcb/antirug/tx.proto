syntax = "proto3";

package qcb.antirug;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "qcb/antirug/params.proto";

option go_package = "qcb/x/antirug/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  
  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams     (MsgUpdateParams    ) returns (MsgUpdateParamsResponse    );
  rpc RegisterToken    (MsgRegisterToken   ) returns (MsgRegisterTokenResponse   );
  rpc LockLiquidity    (MsgLockLiquidity   ) returns (MsgLockLiquidityResponse   );
  rpc DeclareMintLimit (MsgDeclareMintLimit) returns (MsgDeclareMintLimitResponse);
  rpc FlagToken        (MsgFlagToken       ) returns (MsgFlagTokenResponse       );
  rpc FreezeToken      (MsgFreezeToken     ) returns (MsgFreezeTokenResponse     );
  rpc UnfreezeToken    (MsgUnfreezeToken   ) returns (MsgUnfreezeTokenResponse   );
  rpc RequestUpgrade   (MsgRequestUpgrade  ) returns (MsgRequestUpgradeResponse  );
  rpc ApproveToken     (MsgApproveToken    ) returns (MsgApproveTokenResponse    );
  rpc SetModuleActive  (MsgSetModuleActive ) returns (MsgSetModuleActiveResponse );
}
// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) =                     "authority";
  option           (amino.name) = "qcb/x/antirug/MsgUpdateParams";
  
  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

message MsgRegisterToken {
  option (cosmos.msg.v1.signer) = "creator";
  string creator             = 1;
  string tokenId             = 2;
  string tokenName           = 3;
  string symbol              = 4;
  uint64 maxSupply           = 5;
  uint64 liquidityLockBlocks = 6;
}

message MsgRegisterTokenResponse {
  string tokenId     = 1;
  bool   registered  = 2;
  uint64 safetyScore = 3;
}

message MsgLockLiquidity {
  option (cosmos.msg.v1.signer) = "creator";
  string creator    = 1;
  string tokenId    = 2;
  uint64 amount     = 3;
  uint64 lockBlocks = 4;
}

message MsgLockLiquidityResponse {
  string lockId         = 1;
  int32  unlocksAtBlock = 2;
}

message MsgDeclareMintLimit {
  option (cosmos.msg.v1.signer) = "creator";
  string creator     = 1;
  string tokenId     = 2;
  uint64 maxSupply   = 3;
  uint64 maxPerBlock = 4;
}

message MsgDeclareMintLimitResponse {
  string tokenId  = 1;
  bool   limitSet = 2;
}

message MsgFlagToken {
  option (cosmos.msg.v1.signer) = "creator";
  string creator  = 1;
  string tokenId  = 2;
  string reason   = 3;
  string evidence = 4;
  string severity = 5;
}

message MsgFlagTokenResponse {
  string flagId  = 1;
  string tokenId = 2;
  string status  = 3;
}

message MsgFreezeToken {
  option (cosmos.msg.v1.signer) = "creator";
  string creator  = 1;
  string tokenId  = 2;
  string reason   = 3;
  string evidence = 4;
}

message MsgFreezeTokenResponse {
  string tokenId  = 1;
  bool   frozen   = 2;
  int32  frozenAt = 3;
}

message MsgUnfreezeToken {
  option (cosmos.msg.v1.signer) = "creator";
  string creator       = 1;
  string tokenId       = 2;
  string justification = 3;
}

message MsgUnfreezeTokenResponse {
  string tokenId  = 1;
  bool   unfrozen = 2;
}

message MsgRequestUpgrade {
  option (cosmos.msg.v1.signer) = "creator";
  string creator     = 1;
  string tokenId     = 2;
  string upgradeType = 3;
  string description = 4;
}

message MsgRequestUpgradeResponse {
  string requestId      = 1;
  int32  timelockEndsAt = 2;
}

message MsgApproveToken {
  option (cosmos.msg.v1.signer) = "creator";
  string creator       = 1;
  string tokenId       = 2;
  string verdict       = 3;
  string justification = 4;
}

message MsgApproveTokenResponse {
  string tokenId     = 1;
  bool   approved    = 2;
  uint64 safetyScore = 3;
}

message MsgSetModuleActive {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string active  = 2;
  string reason  = 3;
}

message MsgSetModuleActiveResponse {
  bool  active      = 1;
  int32 activatedAt = 2;
}

