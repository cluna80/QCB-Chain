syntax = "proto3";
package qcb.antirug;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "qcb/x/antirug/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "qcb/x/antirug/Params";
  option (gogoproto.equal) = true;

  
  bool enabled = 1 [(gogoproto.moretags) = "yaml:\"enabled\""];
  uint64 minLiquidityLockBlocks = 2 [(gogoproto.moretags) = "yaml:\"min_liquidity_lock_blocks\""];
  uint64 maxMintPerBlock = 3 [(gogoproto.moretags) = "yaml:\"max_mint_per_block\""];
  uint64 timelockBlocks = 4 [(gogoproto.moretags) = "yaml:\"timelock_blocks\""];
  bool circuitBreakerEnabled = 5 [(gogoproto.moretags) = "yaml:\"circuit_breaker_enabled\""];
  uint64 daoApprovalThreshold = 6 [(gogoproto.moretags) = "yaml:\"dao_approval_threshold\""];
}