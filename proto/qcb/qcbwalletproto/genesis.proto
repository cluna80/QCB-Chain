syntax = "proto3";
package qcb.qcbwalletproto;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "qcb/qcbwalletproto/params.proto";

option go_package = "qcb/x/qcbwalletproto/types";

// GenesisState defines the qcbwalletproto module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
