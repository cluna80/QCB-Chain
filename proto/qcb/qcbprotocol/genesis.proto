syntax = "proto3";
package qcb.qcbprotocol;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "qcb/qcbprotocol/params.proto";

option go_package = "qcb/x/qcbprotocol/types";

// GenesisState defines the qcbprotocol module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
