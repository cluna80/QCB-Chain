syntax = "proto3";
package qcb.qcbrelay;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "qcb/qcbrelay/params.proto";

option go_package = "qcb/x/qcbrelay/types";

// GenesisState defines the qcbrelay module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
