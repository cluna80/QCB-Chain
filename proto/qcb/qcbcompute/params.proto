syntax = "proto3";
package qcb.qcbcompute;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "qcb/x/qcbcompute/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "qcb/x/qcbcompute/Params";
  option (gogoproto.equal) = true;

  
  uint64 inferenceReward = 1 [(gogoproto.moretags) = "yaml:\"inference_reward\""];
  uint64 slashAmount = 2 [(gogoproto.moretags) = "yaml:\"slash_amount\""];
  uint64 computeEpoch = 3 [(gogoproto.moretags) = "yaml:\"compute_epoch\""];
}