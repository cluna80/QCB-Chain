syntax = "proto3";
package qcb.qcbbridge;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "qcb/qcbbridge/params.proto";

option go_package = "qcb/x/qcbbridge/types";

// GenesisState defines the qcbbridge module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
