syntax = "proto3";
package qcb.qcbbridge;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "qcb/x/qcbbridge/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "qcb/x/qcbbridge/Params";
  option (gogoproto.equal) = true;

  
  uint64 bridgeFee = 1 [(gogoproto.moretags) = "yaml:\"bridge_fee\""];
  uint64 maxPacketSize = 2 [(gogoproto.moretags) = "yaml:\"max_packet_size\""];
  uint64 timeoutBlocks = 3 [(gogoproto.moretags) = "yaml:\"timeout_blocks\""];
}