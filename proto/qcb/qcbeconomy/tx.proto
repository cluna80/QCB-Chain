syntax = "proto3";

package qcb.qcbeconomy;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "qcb/qcbeconomy/params.proto";

option go_package = "qcb/x/qcbeconomy/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  
  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams      (MsgUpdateParams     ) returns (MsgUpdateParamsResponse     );
  rpc CreateTask        (MsgCreateTask       ) returns (MsgCreateTaskResponse       );
  rpc CompleteTask      (MsgCompleteTask     ) returns (MsgCompleteTaskResponse     );
  rpc AcceptTask        (MsgAcceptTask       ) returns (MsgAcceptTaskResponse       );
  rpc DisputeTask       (MsgDisputeTask      ) returns (MsgDisputeTaskResponse      );
  rpc ClaimUbi          (MsgClaimUbi         ) returns (MsgClaimUbiResponse         );
  rpc StakeTokens       (MsgStakeTokens      ) returns (MsgStakeTokensResponse      );
  rpc DistributeRewards (MsgDistributeRewards) returns (MsgDistributeRewardsResponse);
}
// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) =                        "authority";
  option           (amino.name) = "qcb/x/qcbeconomy/MsgUpdateParams";
  
  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

message MsgCreateTask {
  option (cosmos.msg.v1.signer) = "creator";
  string creator     = 1;
  string title       = 2;
  string description = 3;
  uint64 reward      = 4;
  int32  deadline    = 5;
}

message MsgCreateTaskResponse {
  string taskId = 1;
  uint64 reward = 2;
}

message MsgCompleteTask {
  option (cosmos.msg.v1.signer) = "creator";
  string creator    = 1;
  string taskId     = 2;
  string resultHash = 3;
}

message MsgCompleteTaskResponse {
  bool   success = 1;
  uint64 reward  = 2;
}

message MsgAcceptTask {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string taskId  = 2;
}

message MsgAcceptTaskResponse {
  string taskId   = 1;
  string assignee = 2;
}

message MsgDisputeTask {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  string taskId  = 2;
  string reason  = 3;
}

message MsgDisputeTaskResponse {
  string disputeId = 1;
  string status    = 2;
}

message MsgClaimUbi {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
}

message MsgClaimUbiResponse {
  uint64 amount    = 1;
  int32  claimedAt = 2;
}

message MsgStakeTokens {
  option (cosmos.msg.v1.signer) = "creator";
  string creator    = 1;
  uint64 amount     = 2;
  int32  lockPeriod = 3;
}

message MsgStakeTokensResponse {
  string stakeId     = 1;
  uint64 amount      = 2;
  int32  unlockBlock = 3;
}

message MsgDistributeRewards {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  int32  epoch   = 2;
}

message MsgDistributeRewardsResponse {
  uint64 totalDistributed = 1;
  int32  recipients       = 2;
}

