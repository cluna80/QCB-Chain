syntax = "proto3";

package qcb.qcbguardian;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "qcb/qcbguardian/params.proto";

option go_package = "qcb/x/qcbguardian/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  
  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams   (MsgUpdateParams  ) returns (MsgUpdateParamsResponse  );
  rpc AddGuardian    (MsgAddGuardian   ) returns (MsgAddGuardianResponse   );
  rpc RemoveGuardian (MsgRemoveGuardian) returns (MsgRemoveGuardianResponse);
  rpc GuardianVeto   (MsgGuardianVeto  ) returns (MsgGuardianVetoResponse  );
  rpc SetAiLimits    (MsgSetAiLimits   ) returns (MsgSetAiLimitsResponse   );
  rpc EmergencyPause (MsgEmergencyPause) returns (MsgEmergencyPauseResponse);
  rpc LiftPause      (MsgLiftPause     ) returns (MsgLiftPauseResponse     );
  rpc ApproveModel   (MsgApproveModel  ) returns (MsgApproveModelResponse  );
}
// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) =                         "authority";
  option           (amino.name) = "qcb/x/qcbguardian/MsgUpdateParams";
  
  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

message MsgAddGuardian {
  option (cosmos.msg.v1.signer) = "creator";
  string creator       = 1;
  string guardianAddr  = 2;
  string displayName   = 3;
  string justification = 4;
}

message MsgAddGuardianResponse {
  string guardianAddr = 1;
  bool   active       = 2;
}

message MsgRemoveGuardian {
  option (cosmos.msg.v1.signer) = "creator";
  string creator      = 1;
  string guardianAddr = 2;
  string reason       = 3;
}

message MsgRemoveGuardianResponse {
  bool success = 1;
}

message MsgGuardianVeto {
  option (cosmos.msg.v1.signer) = "creator";
  string creator  = 1;
  string jobId    = 2;
  string reason   = 3;
  string severity = 4;
}

message MsgGuardianVetoResponse {
  string vetoId = 1;
  string jobId  = 2;
  bool   halted = 3;
}

message MsgSetAiLimits {
  option (cosmos.msg.v1.signer) = "creator";
  string creator           = 1;
  uint64 maxJobsPerBlock   = 2;
  uint64 maxFeePerJob      = 3;
  string allowedModelTypes = 4;
  string bannedKeywords    = 5;
}

message MsgSetAiLimitsResponse {
  bool  success   = 1;
  int32 appliedAt = 2;
}

message MsgEmergencyPause {
  option (cosmos.msg.v1.signer) = "creator";
  string creator  = 1;
  string reason   = 2;
  string evidence = 3;
}

message MsgEmergencyPauseResponse {
  string pauseId   = 1;
  bool   active    = 2;
  int32  expiresAt = 3;
}

message MsgLiftPause {
  option (cosmos.msg.v1.signer) = "creator";
  string creator       = 1;
  string pauseId       = 2;
  string justification = 3;
}

message MsgLiftPauseResponse {
  bool success = 1;
}

message MsgApproveModel {
  option (cosmos.msg.v1.signer) = "creator";
  string creator       = 1;
  string modelId       = 2;
  string verdict       = 3;
  string justification = 4;
}

message MsgApproveModelResponse {
  string modelId  = 1;
  bool   approved = 2;
}

